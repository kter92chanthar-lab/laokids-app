<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ໂຫລດແອັບ ກ-ຮ (Lao Kids)</title>

<!-- ===== เปลี่ยน URL ด้านล่างเป็นลิงก์จริงหลังอัพขึ้น GitHub Pages ===== -->
<meta property="og:title" content="ແອັບຮຽນພາສາລາວ ກ-ຮ (Lao Kids)">
<meta property="og:description" content="ສື່ການຮຽນພາສາລາວສຳລັບເດັກນ້ອຍ - ກົດເພື່ອໂຫລດ ແລະ ຕິດຕັ້ງ">
<meta property="og:image" content="https://kter92chanthar-lab.github.io/laokids-app/logo.jpg">
<meta property="og:url" content="https://kter92chanthar-lab.github.io/laokids-app/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://kter92chanthar-lab.github.io/laokids-app/logo.jpg">

<style>
  body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#e8f7ef,#fff8e6);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
  }
  img.logo{
    width:100%;
    max-width:420px;
    border-radius:20px;
    box-shadow:0 8px 24px rgba(0,0,0,0.15);
    margin-bottom:20px;
  }
  h1{ color:#2e7d32; font-size:1.5em; margin:6px 0; }
  p{ color:#444; font-size:1em; margin:6px 0; line-height:1.5; }
  ul{ text-align:left; color:#444; max-width:420px; }
  .status{ color:#2e7d32; font-weight:bold; margin-top:20px; }
  .btn{
    background:#2e7d32;
    color:white;
    padding:14px 36px;
    border-radius:50px;
    text-decoration:none;
    font-size:1.1em;
    font-weight:bold;
    box-shadow:0 6px 16px rgba(46,125,50,0.4);
    margin-top:16px;
    display:none;
  }
</style>
</head>
<body>
  <!-- APK ดาวน์โหลดจาก GitHub Release โดยตรง ไม่ต้องอัพไฟล์ apk ที่นี่ -->
  <img src="logo.jpg" class="logo" alt="Lao Kids Logo">
  <h1>ແອັບຮຽນພາສາລາວ ກ-ຮ (Lao Kids)</h1>
  <p>ສື່ການຮຽນພາສາລາວສຳລັບເດັກນ້ອຍ ຄົບທຸກພະຍັນຊະນະ, ສະຫຼະ, ຕົວເລກ ແລະ ເກມຝຶກຫັດ</p>

  <p class="status" id="status">ກໍາລັງໂຫລດ APK ໃຫ້ທ່ານ...</p>
  <a id="manualLink"
     href="https://github.com/kter92chanthar-lab/laokids-app/releases/download/v1.0.0/base.apk"
     class="btn" download>⬇️ ກົດທີ່ນີ້ຖ້າບໍ່ໄດ້ໂຫລດອັດຕະໂນມັດ</a>

  <p style="font-size:0.85em;color:#888;margin-top:20px;">
    ຖ້າມືຖືບໍ່ໃຫ້ຕິດຕັ້ງ: ໄປທີ່ Settings → Apps → ອະນຸຍາດ "Install unknown apps"
  </p>

  <script>
    var apkUrl = "https://github.com/kter92chanthar-lab/laokids-app/releases/download/v1.0.0/base.apk";
    window.onload = function(){
      var a = document.createElement('a');
      a.href = apkUrl;
      a.download = 'laokids.apk';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      setTimeout(function(){
        document.getElementById('status').textContent = 'ດາວໂຫລດແລ້ວ! ຖ້າບໍ່ມີຫຍັງເກີດຂຶ້ນ ກົດປຸ່ມລຸ່ມນີ້:';
        document.getElementById('manualLink').style.display = 'inline-block';
      }, 1500);
    };
  </script>
</body>
</html>
